name: Deploy InRainWaterHarvesting to VPS

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/inrainwaterharvesting:latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ github.token }}" | docker login ghcr.io \
          -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME

      - name: Debug SSH Connectivity
        run: |
          echo "Testing connectivity to SSH host..."
          HOST="${{ secrets.SERVER_HOST }}"
          PORT="${{ secrets.SERVER_PORT || 22 }}"
          
          # Try to resolve hostname
          echo "DNS Resolution:"
          nslookup "$HOST" || dig "$HOST" || echo "DNS lookup failed"
          
          # Check if host is reachable
          echo -e "\nPing test:"
          ping -c 3 "$HOST" || echo "Ping failed"
          
          # Test SSH port connectivity
          echo -e "\nSSH port connectivity:"
          timeout 5 bash -c "</dev/tcp/$HOST/$PORT" && echo "Port $PORT is open" || echo "Port $PORT is blocked/closed"
          
          # Show GitHub Action runner IP
          echo -e "\nGitHub Actions runner IP:"
          curl -s https://api.github.com/meta | jq '.actions'

      - name: SSH Deploy VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /srv/app

            echo "${{ github.token }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d

            docker image prune -af
